# markdownlint-cli2 configuration for the docs stack.
# Tuned so well-formed documentation (long lines, wide tables, ADR-style sections)
# passes, while still catching genuine markdown defects.
config:
  default: true
  MD013: false # line length — docs use long lines and wide tables
  MD033: false # inline HTML — allow when a doc needs it
  MD041: false # first line need not be a top-level heading (badges/front matter)
  MD024:
    siblings_only: true # allow repeated headings under different parents (ADR sections)
  MD060: false # table pipe spacing — cosmetic; allow compact separator rows
globs:
  - "**/*.md"
ignores:
  - "node_modules"
  - ".git"
  